<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <radialGradient id="softGreen1" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#bdf4af" stop-opacity="0.34"/>
      <stop offset="0.48" stop-color="#dff8d8" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="softGreen2" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#e6f8dd" stop-opacity="0.44"/>
      <stop offset="0.62" stop-color="#f7fff3" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leafGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d8f7cf" stop-opacity="0.72"/>
      <stop offset="0.52" stop-color="#a9ee9e" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#6fcf64" stop-opacity="0.70"/>
    </linearGradient>
    <linearGradient id="leafGrad2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f0fbeb" stop-opacity="0.60"/>
      <stop offset="0.55" stop-color="#b9edaa" stop-opacity="0.66"/>
      <stop offset="1" stop-color="#80d674" stop-opacity="0.54"/>
    </linearGradient>
    <filter id="waterBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="2" seed="14" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.18  0 0 0 0 0.24  0 0 0 0 0.19  0 0 0 0.035 0" result="grain"/>
      <feBlend in="SourceGraphic" in2="grain" mode="multiply"/>
    </filter>
    <g id="leafBranch">
      <path d="M0 0 C65 26, 125 58, 180 112" stroke="#c8b27a" stroke-width="2" fill="none" opacity="0.32"/>
      <ellipse cx="28" cy="-6" rx="13" ry="45" fill="url(#leafGrad)" opacity="0.76" transform="rotate(-48 28 -6)"/>
      <ellipse cx="62" cy="20" rx="16" ry="56" fill="url(#leafGrad2)" opacity="0.72" transform="rotate(-22 62 20)"/>
      <ellipse cx="101" cy="42" rx="17" ry="63" fill="url(#leafGrad)" opacity="0.62" transform="rotate(14 101 42)"/>
      <ellipse cx="142" cy="74" rx="14" ry="48" fill="url(#leafGrad2)" opacity="0.58" transform="rotate(46 142 74)"/>
      <path d="M20 -6 L44 2 M56 20 L85 30 M94 42 L126 54 M136 74 L162 88" stroke="#6fbf64" stroke-width="1.2" opacity="0.24"/>
      <circle cx="24" cy="-34" r="2.2" fill="#c9ad74" opacity="0.50"/>
      <circle cx="68" cy="-5" r="1.8" fill="#c9ad74" opacity="0.42"/>
      <circle cx="16" cy="46" r="2" fill="#c9ad74" opacity="0.42"/>
    </g>
  </defs>

  <rect width="1080" height="1350" fill="#fffefb"/>
  <rect width="1080" height="1350" fill="#ffffff" opacity="0.72" filter="url(#paper)"/>

  <!-- soft watercolor atmosphere -->
  <g filter="url(#waterBlur)">
    <ellipse cx="62" cy="76" rx="290" ry="205" fill="url(#softGreen1)" opacity="0.75"/>
    <ellipse cx="1038" cy="94" rx="255" ry="185" fill="url(#softGreen2)" opacity="0.55"/>
    <ellipse cx="54" cy="1270" rx="300" ry="210" fill="url(#softGreen2)" opacity="0.62"/>
    <ellipse cx="1010" cy="1260" rx="285" ry="225" fill="url(#softGreen1)" opacity="0.50"/>
  </g>

  <!-- delicate curved lines -->
  <path d="M640 50 C765 120, 865 35, 1050 126" stroke="#a5d894" stroke-width="1.25" fill="none" opacity="0.30"/>
  <path d="M32 980 C150 1090, 142 1255, 374 1210" stroke="#aadf98" stroke-width="1.15" fill="none" opacity="0.23"/>
  <path d="M92 210 C170 280, 245 250, 328 332" stroke="#b5df9b" stroke-width="1.3" fill="none" opacity="0.22"/>
<path d="M750 1180 C850 1110, 940 1160, 1015 1076" stroke="#b5df9b" stroke-width="1.2" fill="none" opacity="0.20"/>

  <!-- fixed premium leaf assets -->
  <g transform="translate(-8 20) scale(1.38) rotate(8)" opacity="0.55"><use href="#leafBranch"/></g>
  <g transform="translate(1080 92) scale(-0.86 0.86) rotate(164)" opacity="0.24"><use href="#leafBranch"/></g>
  <g transform="translate(-6 1110) scale(1.08) rotate(-34)" opacity="0.22"><use href="#leafBranch"/></g>
  <g transform="translate(1078 1084) scale(-1.12 1.12) rotate(203)" opacity="0.58"><use href="#leafBranch"/></g>

  <!-- very subtle gold flecks -->
  <g fill="#c9ad74" opacity="0.30">
    <circle cx="95" cy="172" r="1.7"/><circle cx="124" cy="205" r="1.2"/><circle cx="158" cy="178" r="1.1"/>
    <circle cx="942" cy="126" r="1.4"/><circle cx="983" cy="157" r="1.1"/>
    <circle cx="128" cy="1218" r="1.4"/><circle cx="94" cy="1256" r="1.1"/>
    <circle cx="968" cy="1188" r="1.5"/><circle cx="1002" cy="1224" r="1.1"/>
  </g>
</svg>